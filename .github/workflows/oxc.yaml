name: OXC

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

jobs:
  oxlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - run: bun install --frozen-lockfile
      - run: bun run lint:github
      - run: bun run fmt:check
